name: Build and push jive to Azure

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag in format "vYYYY.MM.DD.XX".'
        required: true
        type: string
      acr_name:
        description: 'Azure container registry name.'
        required: true
        type: string
      image_name:
        description: 'Name of the Docker image to build.'
        required: true
        type: string
      release_type:
        description: 'Type of release.'
        required: true
        type: string
        # type: environment/choices not supported for workflow_call
      # container_app_name:
      #   description: 'Name of the Azure container app the image is for.'
      #   required: true
        # type: string
    secrets:
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true



jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.acr_name }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.acr_name }}.azurecr.io/${{ inputs.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.release_tag }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./worker
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
