      #   run: |
      #     az containerapp update -n ${{ inputs.container_app_name }} -g ${{ secrets.ACR_RESOURCE_GROUP }} --image ${{ inputs.acr_name }}.azurecr.io/${{ inputs.image_name }}:${{ inputs.release_tag }}