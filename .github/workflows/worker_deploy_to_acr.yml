name: Build and deploy jive worker to acr
run-name: Build & push prod image

on:
  release:
      types: [published]
      branches:
        - main
  # push:
  #   paths:
  #     - 'worker/**'
  #   branches:
  #     - main
  workflow_dispatch:

env:
  ACR_NAME: acrimpact
  IMAGE_NAME: jive-worker
  CONTAINER_APP_NAME: jive-worker

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set current date as env variable
        run: echo "IMAGE_TAG=$(date +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_ENV
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.IMAGE_TAG }}
            # type=sha,prefix=prod-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./worker
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # - name: Azure Login
      #   uses: azure/login@v3
      #   with:
      #     creds: ${{ secrets.AZURE_CREDENTIALS }}
      # - name: Deploy to containerapp
      #   run: |
      #     az containerapp update -n ${{ env.CONTAINER_APP_NAME }} -g ${{ secrets.ACR_RESOURCE_GROUP }} --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}