name: Publish Release

# Jive and argus are deployed together so can share the same release tag.
# argus schemas can be released independently so can possibly have
# its own different release tag (likely only if it released twice
# in one day)

on:
  workflow_dispatch:
    types: [manual-trigger]
    inputs:
      release_tag:
        description: '"Jive" and "Argus" release tag in format "vYYYY.MM.DD.XX" .'
        required: true
        type: string
      deploy_argus:
        description: 'Publish an "Arugs" release.'
        required: true
        type: boolean
      deploy_argus_schemas:
        description: 'Publish an "Arugs Schemas" release.'
        required: true
        type: boolean
      argus_schemas_release_tag:
        description: '"Argus Schemas" release tag in format "vYYYY.MM.DD.XX".'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish_argus_schemas:
      if: ${{ inputs.deploy_argus_schemas }} 
      runs-on: ubuntu-latest
      steps:
        - name: Trigger argus_schemas workflow
          uses: peter-evans/repository-dispatch@v4
          with:
            token: ${{ secrets.REPO_DISPATCH_TOKEN }}  
            repository: impact-initiatives/argus_schemas
            event-type: manual-release
            client-payload: '{"release_tag": "${{ inputs.argus_schemas_release_tag }}"}'

  publish_argus:
    if: ${{ inputs.deploy_argus && (success() || needs.publish_argus_schemas.result == 'skipped') }}
    needs: publish_argus_schemas
    runs-on: ubuntu-latest
    steps:
        - name: Trigger argus workflow
          uses: peter-evans/repository-dispatch@v4
          with:
            token: ${{ secrets.REPO_DISPATCH_TOKEN }}  
            repository: impact-initiatives/argus
            event-type: manual-release
            client-payload: '{"release_tag": "${{ inputs.release_tag }}"}'

  publish_jive:
    needs: publish_argus
    if: ${{ success() || needs.publish_argus.result == 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6  

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          generate_release_notes: true

      - name: Trigger acr deployments
        uses: peter-evans/repository-dispatch@v4
        with:
          event-type: post-release-processing